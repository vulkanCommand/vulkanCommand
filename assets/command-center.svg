<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Durga Kalyan command center stats</title>
  <desc id="desc">Cinematic developer stats panel showing contributions by year, public repositories, commits, pull requests, and estimated build hours.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070A12"/>
      <stop offset="0.45" stop-color="#101729"/>
      <stop offset="1" stop-color="#07131A"/>
    </linearGradient>
    <linearGradient id="panel" x1="110" y1="90" x2="1090" y2="685" gradientUnits="userSpaceOnUse">
      <stop stop-color="#141B31" stop-opacity="0.96"/>
      <stop offset="0.55" stop-color="#171327" stop-opacity="0.94"/>
      <stop offset="1" stop-color="#0B2027" stop-opacity="0.94"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#66E7D8"/>
      <stop offset="1" stop-color="#6C8CFF"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F6D365"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="magenta" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#C084FC"/>
      <stop offset="1" stop-color="#F472B6"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="13" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.24 0 0 0 0 0.84 0 0 0 0 0.78 0 0 0 0.7 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace; }
      .sans { font-family: Inter, Segoe UI, Arial, sans-serif; }
      .tiny { font-size: 18px; letter-spacing: 2px; }
      .label { font-size: 23px; fill: #8CA3C7; }
      .value { font-size: 46px; font-weight: 800; fill: #F8FAFC; }
      .sub { font-size: 20px; fill: #7DD3FC; }
      .caption { font-size: 18px; fill: #95A3B8; }
    </style>
  </defs>

  <rect width="1200" height="760" rx="34" fill="url(#bg)"/>
  <circle cx="1035" cy="95" r="180" fill="#1D4ED8" opacity="0.18" filter="url(#glow)"/>
  <circle cx="128" cy="641" r="210" fill="#14B8A6" opacity="0.12" filter="url(#glow)"/>
  <path d="M86 196C224 96 338 86 492 142C685 212 770 118 918 82C1032 54 1110 90 1164 144" stroke="#38BDF8" stroke-opacity="0.22" stroke-width="2"/>
  <path d="M48 604C222 472 366 528 506 588C680 662 809 629 975 548C1050 512 1110 503 1168 518" stroke="#C084FC" stroke-opacity="0.22" stroke-width="2"/>

  <rect x="70" y="58" width="1060" height="642" rx="28" fill="url(#panel)" stroke="#334155" stroke-width="1.5" filter="url(#soft)"/>
  <rect x="96" y="86" width="1008" height="590" rx="22" stroke="#67E8F9" stroke-opacity="0.22"/>

  <text x="120" y="138" class="mono tiny" fill="#5EEAD4">VULKANCOMMAND / XCOMMANDER</text>
  <text x="120" y="190" class="sans" font-size="52" font-weight="800" fill="#E0F2FE">Application Build Command Center</text>
  <text x="120" y="226" class="sans caption">Public GitHub signal plus transparent estimated build time across mobile, cloud, AI, and developer tooling.</text>

  <g transform="translate(120 276)">
    <rect width="270" height="136" rx="18" fill="#0F172A" stroke="#38BDF8" stroke-opacity="0.35"/>
    <text x="24" y="45" class="sans label">Public contributions</text>
    <text x="24" y="95" class="sans value">759</text>
    <text x="150" y="95" class="sans sub">2024-2026</text>
  </g>

  <g transform="translate(420 276)">
    <rect width="270" height="136" rx="18" fill="#0F172A" stroke="#A78BFA" stroke-opacity="0.35"/>
    <text x="24" y="45" class="sans label">Tracked commits</text>
    <text x="24" y="95" class="sans value">566+</text>
    <text x="164" y="95" class="sans sub">all time</text>
  </g>

  <g transform="translate(720 276)">
    <rect width="270" height="136" rx="18" fill="#0F172A" stroke="#F59E0B" stroke-opacity="0.35"/>
    <text x="24" y="45" class="sans label">Build hours</text>
    <text x="24" y="95" class="sans value">1000+</text>
    <text x="185" y="95" class="sans sub">est.</text>
  </g>

  <g transform="translate(120 454)">
    <text x="0" y="0" class="mono tiny" fill="#93C5FD">CONTRIBUTIONS BY YEAR</text>
    <text x="0" y="46" class="sans label">2024</text>
    <rect x="92" y="25" width="445" height="18" rx="9" fill="#1E293B"/>
    <rect x="92" y="25" width="16" height="18" rx="9" fill="url(#gold)"/>
    <text x="560" y="45" class="sans sub">1 contribution</text>

    <text x="0" y="94" class="sans label">2025</text>
    <rect x="92" y="73" width="445" height="18" rx="9" fill="#1E293B"/>
    <rect x="92" y="73" width="198" height="18" rx="9" fill="url(#magenta)"/>
    <text x="560" y="93" class="sans sub">233 contributions</text>

    <text x="0" y="142" class="sans label">2026</text>
    <rect x="92" y="121" width="445" height="18" rx="9" fill="#1E293B"/>
    <rect x="92" y="121" width="445" height="18" rx="9" fill="url(#cyan)"/>
    <text x="560" y="141" class="sans sub">525 contributions</text>
  </g>

  <g transform="translate(120 632)">
    <rect width="166" height="44" rx="14" fill="#111827" stroke="#64748B" stroke-opacity="0.35"/>
    <text x="18" y="29" class="sans" font-size="18" fill="#E2E8F0">15 public repos</text>
    <rect x="186" width="112" height="44" rx="14" fill="#111827" stroke="#64748B" stroke-opacity="0.35"/>
    <text x="204" y="29" class="sans" font-size="18" fill="#E2E8F0">16 PRs</text>
    <rect x="318" width="158" height="44" rx="14" fill="#111827" stroke="#64748B" stroke-opacity="0.35"/>
    <text x="336" y="29" class="sans" font-size="18" fill="#E2E8F0">4 flagship apps</text>
    <rect x="496" width="186" height="44" rx="14" fill="#111827" stroke="#64748B" stroke-opacity="0.35"/>
    <text x="514" y="29" class="sans" font-size="18" fill="#E2E8F0">AI + cloud systems</text>
  </g>

  <g transform="translate(872 444)">
    <circle cx="98" cy="82" r="72" stroke="#1E293B" stroke-width="14"/>
    <path d="M98 10A72 72 0 1 1 44 35" stroke="url(#cyan)" stroke-width="14" stroke-linecap="round"/>
    <circle cx="98" cy="82" r="44" fill="#111827" stroke="#334155"/>
    <text x="98" y="74" text-anchor="middle" class="sans" font-size="16" fill="#94A3B8">build mode</text>
    <text x="98" y="108" text-anchor="middle" class="sans" font-size="30" font-weight="800" fill="#5EEAD4">ACTIVE</text>
    <text x="0" y="186" class="sans caption">Estimated hours are a</text>
    <text x="0" y="212" class="sans caption">portfolio signal.</text>
  </g>
</svg>
