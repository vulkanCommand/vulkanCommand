<svg width="1200" height="820" viewBox="0 0 1200 820" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Durga Kalyan professional GitHub command center</title>
  <desc id="desc">Cinematic GitHub profile dashboard with public contributions, tracked commits, estimated build hours, yearly contribution bars, flagship applications, and build mode status.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050816"/>
      <stop offset="0.42" stop-color="#101827"/>
      <stop offset="1" stop-color="#061B20"/>
    </linearGradient>
    <linearGradient id="panel" x1="90" y1="78" x2="1110" y2="742" gradientUnits="userSpaceOnUse">
      <stop stop-color="#11182D" stop-opacity="0.98"/>
      <stop offset="0.58" stop-color="#171327" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#08242A" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#5EEAD4"/>
      <stop offset="1" stop-color="#7CA2FF"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FDE68A"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="magenta" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#C084FC"/>
      <stop offset="1" stop-color="#F472B6"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.12 0 0 0 0 0.72 0 0 0 0 0.78 0 0 0 0.62 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace; letter-spacing: 0; }
      .sans { font-family: Inter, Segoe UI, Arial, sans-serif; letter-spacing: 0; }
      .kicker { font-size: 18px; font-weight: 700; }
      .caption { font-size: 20px; fill: #9DB0D0; }
      .label { font-size: 22px; fill: #9DB0D0; }
      .value { font-size: 48px; font-weight: 850; fill: #F8FAFC; }
      .small { font-size: 18px; fill: #7DD3FC; }
      .chip { font-size: 18px; fill: #E2E8F0; }
    </style>
  </defs>

  <rect width="1200" height="820" rx="34" fill="url(#bg)"/>
  <circle cx="1026" cy="122" r="184" fill="#2563EB" opacity="0.17" filter="url(#glow)"/>
  <circle cx="138" cy="675" r="230" fill="#14B8A6" opacity="0.12" filter="url(#glow)"/>
  <path d="M72 210C232 94 362 98 510 150C686 212 776 122 928 84C1034 58 1124 92 1174 150" stroke="#38BDF8" stroke-opacity="0.20" stroke-width="2"/>
  <path d="M64 630C218 500 382 528 528 594C682 664 820 632 986 548C1052 515 1114 504 1168 518" stroke="#C084FC" stroke-opacity="0.20" stroke-width="2"/>

  <rect x="62" y="52" width="1076" height="716" rx="30" fill="url(#panel)" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="92" y="84" width="1016" height="652" rx="24" stroke="#67E8F9" stroke-opacity="0.22"/>

  <text x="124" y="134" class="mono kicker" fill="#5EEAD4">VULKANCOMMAND / XCOMMANDER</text>
  <text x="124" y="194" class="sans" font-size="56" font-weight="850" fill="#E0F2FE">Application Build Command Center</text>
  <text x="124" y="234" class="sans caption">Public GitHub signal, shipped product focus, and transparent estimated build time across mobile, cloud, AI, and tooling.</text>

  <g transform="translate(124 286)">
    <rect width="290" height="142" rx="18" fill="#0B1222" stroke="#38BDF8" stroke-opacity="0.38"/>
    <text x="24" y="46" class="sans label">Public contributions</text>
    <text x="24" y="101" class="sans value">837</text>
    <text x="172" y="100" class="sans small">2024-2026</text>
  </g>

  <g transform="translate(454 286)">
    <rect width="290" height="142" rx="18" fill="#0B1222" stroke="#A78BFA" stroke-opacity="0.38"/>
    <text x="24" y="46" class="sans label">Tracked commits</text>
    <text x="24" y="101" class="sans value">566+</text>
    <text x="184" y="100" class="sans small">all time</text>
  </g>

  <g transform="translate(784 286)">
    <rect width="290" height="142" rx="18" fill="#0B1222" stroke="#F59E0B" stroke-opacity="0.38"/>
    <text x="24" y="46" class="sans label">Estimated build hours</text>
    <text x="24" y="101" class="sans value">1000+</text>
    <text x="200" y="100" class="sans small">portfolio</text>
  </g>

  <g transform="translate(124 488)">
    <text x="0" y="0" class="mono kicker" fill="#93C5FD">PUBLIC CONTRIBUTIONS BY YEAR</text>
    <text x="0" y="52" class="sans label">2024</text>
    <rect x="96" y="31" width="430" height="18" rx="9" fill="#1E293B"/>
    <rect x="96" y="31" width="16" height="18" rx="9" fill="url(#gold)"/>
    <text x="552" y="51" class="sans small">1 contribution</text>

    <text x="0" y="106" class="sans label">2025</text>
    <rect x="96" y="85" width="430" height="18" rx="9" fill="#1E293B"/>
    <rect x="96" y="85" width="191" height="18" rx="9" fill="url(#magenta)"/>
    <text x="552" y="105" class="sans small">233 contributions</text>

    <text x="0" y="160" class="sans label">2026</text>
    <rect x="96" y="139" width="430" height="18" rx="9" fill="#1E293B"/>
    <rect x="96" y="139" width="430" height="18" rx="9" fill="url(#cyan)"/>
    <text x="552" y="159" class="sans small">603 contributions</text>
  </g>

  <g transform="translate(858 488)">
    <circle cx="104" cy="94" r="82" stroke="#1E293B" stroke-width="16"/>
    <path d="M104 12A82 82 0 1 1 44 39" stroke="url(#cyan)" stroke-width="16" stroke-linecap="round"/>
    <circle cx="104" cy="94" r="50" fill="#111827" stroke="#334155"/>
    <text x="104" y="86" text-anchor="middle" class="sans" font-size="17" fill="#94A3B8">build mode</text>
    <text x="104" y="123" text-anchor="middle" class="sans" font-size="32" font-weight="850" fill="#5EEAD4">ACTIVE</text>
    <text x="104" y="205" text-anchor="middle" class="sans small">mobile + cloud + AI</text>
  </g>

  <g transform="translate(124 682)">
    <rect width="172" height="44" rx="14" fill="#101827" stroke="#64748B" stroke-opacity="0.36"/>
    <text x="21" y="29" class="sans chip">15 public repos</text>

    <rect x="194" width="106" height="44" rx="14" fill="#101827" stroke="#64748B" stroke-opacity="0.36"/>
    <text x="221" y="29" class="sans chip">16 PRs</text>

    <rect x="322" width="170" height="44" rx="14" fill="#101827" stroke="#64748B" stroke-opacity="0.36"/>
    <text x="348" y="29" class="sans chip">4 flagship apps</text>

    <rect x="514" width="202" height="44" rx="14" fill="#101827" stroke="#64748B" stroke-opacity="0.36"/>
    <text x="540" y="29" class="sans chip">AI + cloud systems</text>

    <rect x="738" width="216" height="44" rx="14" fill="#101827" stroke="#64748B" stroke-opacity="0.36"/>
    <text x="764" y="29" class="sans chip">professional shipping</text>
  </g>

  <text x="600" y="750" text-anchor="middle" class="mono" font-size="16" fill="#8CA3C7">Local time: 2026-07-09 11:47 ET</text>
</svg>
