name: Refresh Daily Pulse

on:
  schedule:
    # 04:00 UTC hits midnight during EDT; 05:00 UTC hits midnight during EST.
    - cron: "0 4 * * *"
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-daily-pulse
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      TIMEZONE: America/New_York

    steps:
      - uses: actions/checkout@v4

      - name: Update profile date
        shell: bash
        run: |
          set -euo pipefail

          export TZ="$TIMEZONE"
          export DISPLAY_DATE="$(date '+%B %-d, %Y')"

          python3 - <<'PY'
          from pathlib import Path
          import os
          import re
          import sys

          display_date = os.environ["DISPLAY_DATE"]

          readme = Path("README.md")
          readme_text = readme.read_text(encoding="utf-8")
          readme_next, readme_count = re.subn(
              r"(<!-- profile-date:start -->\s*<p align=\"center\">\s*<sub><strong>Daily pulse:</strong> )\d{4}-\d{2}-\d{2}",
              lambda match: match.group(1) + display_date,
              readme_text,
              flags=re.S,
          )

          svg = Path("assets/command-center.svg")
          svg_text = svg.read_text(encoding="utf-8")
          svg_next, svg_count = re.subn(
              r"(Daily pulse: )\d{4}-\d{2}-\d{2}",
              lambda match: match.group(1) + display_date,
              svg_text,
          )

          if readme_count != 1 or svg_count != 1:
              print("Expected to update both profile date placeholders exactly once.", file=sys.stderr)
              sys.exit(1)

          if readme_next == readme_text and svg_next == svg_text:
              print("Profile date is already current; no file changes needed.")
              sys.exit(0)

          readme.write_text(readme_next, encoding="utf-8")
          svg.write_text(svg_next, encoding="utf-8")
          PY

      - name: Commit and push if changed
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- README.md assets/command-center.svg; then
            echo "No profile date changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md assets/command-center.svg
          git commit -m "chore: refresh daily profile pulse"
          git push origin HEAD:main
